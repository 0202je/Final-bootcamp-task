<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Newsletter sign-up form with success message</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { display: none; font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    @font-face {
      font-family: 'Roboto-Bold'; /
      src:url('assets/fonts/Roboto-Bold.ttf') format ('truetype'); 
    }
     @font-face {
      font-family:'Roboto-Regular'; 
      src: url('assets/fonts/Roboto-Regular.ttf') format('truetype'); 
    }

    body{
      background-color: black;
      font-family: 'Roboto-Regular', sans-serif;
    }
    #form-container {
      display: flex;
      justify-content:center;
      align-items:center;
    }
    .sign-up-form{
     
      background-color: #ffffff;
      text-align: center;
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-radius: 20px;
      max-width: 56.15rem;
      width: auto;
    }
    .form-content{
    text-align: left;
    margin: 0 3rem;
    font-size: 0.92rem;
    }
    h1{
      font-family: 'Roboto-Bold', sans-serif;
      font-size: 3rem;
      padding-top: 3.5rem;
    }ul {
      padding-left: 0;
      margin-left: 0;
      margin: 1.5rem;
    }
     
    ul li{
      list-style: none;
      list-style-image:url('assets/images/icon-list.svg');
      padding: 0.25rem ;
       
    }
    label b{
      display: block;
      font-family: 'Roboto-Bold', sans-serif;
      padding-top: 1rem;
      margin: 0.50rem;
     
    }
    input
    {
      padding: 1rem;
      width: 90%;
      border-radius: 0.25rem;
      text-align: left;
    }
    button{
      margin-top: 1rem;
      border-radius: 0.25rem;
      background-color: #242742;
      padding:1rem;
      width: 100%;
      color:#ffffff;
    }
    .image{
      padding:1rem;
    }
    @media(max-width:49.25rem)/*788/16px= 49.25rem*/{
      .form-content{
        order: 2;
        font-size: 1.5rem;
        
        border-radius: none;
      }
      .sign-up-form{
        display: grid;
        grid-template-columns: 1fr;
        width: 100%;
         border-radius: 0;
         padding-bottom: 2rem;
      }
      h1{
        font-size: 2.75rem;
      } 
      ul{
        padding-left: 0;
        margin: 1rem;
      }  
      .image{
        order: 1;
        padding: 0;
        
      }
      .image img{
        display: block;
    width: 100%;      
    height: auto;    
    object-fit: cover;
    height:35rem;
    
      }
      button{
        
        padding-bottom: 1rem;
      }
    
    }


  </style>
</head>
<body>
<div id="form-container"> 
  <!-- Sign-up form start -->
<div class="sign-up-form">
  <div class="form-content">
  <h1>Stay updated!</h1>

 <p> Join 60,000+ product managers receiving monthly updates on:</p>
  <ul>
 <li> Product discovery and building what matters</li>
 <li> Measuring to ensure updates are a success</li>
 <li> And much more!</li>
  </ul>
  <form>
  <label for="Email"><b>Email address</b></label>
  <input type="email" name="Email" id="email" placeholder="email@company.com">
  <button onclick ="subscribe()">Subscribe to monthly newsletter</button>
  </form>
  <!-- Sign-up form end -->
   </div>
   <div class="image">
    <img src="assets/images/illustration-sign-up-desktop.svg" alt="image">
   </div>
</div>
</div>
<script>
  <!-- Success message start -->
function subscribe() {
  const email = document.getElementById("email").value;
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (emailPattern.test(email)) {
  alert("Thank you for subscribing");
} else {
  alert("Invalid email address. Please enter a valid email address.")
}
} 

  /*

  A confirmation email has been sent to ash@loremcompany.com. 
  Please open it and click the button inside to confirm your subscription.

  Dismiss message

  <!-- Success message end -->*/
  </script>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">jermina khoza</a>.
  </div>
</body>
</html>
