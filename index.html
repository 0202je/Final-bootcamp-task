<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Newsletter sign-up form with success message</title>

</head>
<body>
<div id="form-container"> 
  <!-- Sign-up form start -->
<div class="sign-up-form">
  <div class="form-content">
  <h1>Stay updated!</h1>

 <p> Join 60,000+ product managers receiving monthly updates on:</p>
  <ul>
 <li> Product discovery and building what matters</li>
 <li> Measuring to ensure updates are a success</li>
 <li> And much more!</li>
  </ul>
  <form>
  <label for="Email"><b>Email address</b></label>
  <input type="email" name="Email" id="email" placeholder="email@company.com">
  <button onclick ="subscribe()">Subscribe to monthly newsletter</button>
  </form>
  <!-- Sign-up form end -->
   </div>
   <div class="image">
    <img src="assets/images/illustration-sign-up-desktop.svg" alt="image">
   </div>
</div>
</div>
<script>
  <!-- Success message start -->
function subscribe() {
  const email = document.getElementById("email").value;
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (emailPattern.test(email)) {
  alert("Thank you for subscribing");
} else {
  alert("Invalid email address. Please enter a valid email address.")
}
} 

  /*

  A confirmation email has been sent to ash@loremcompany.com. 
  Please open it and click the button inside to confirm your subscription.

  Dismiss message

  <!-- Success message end -->*/
  </script>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">jermina khoza</a>.
  </div>
</body>
</html>
